<header class="site-header" role="banner">
  <div class="wrapper">
    <a class="site-title brand" rel="author" href="{{ "/" | relative_url }}">
      <img class="brand-mark" src="{{ "/assets/logo.png" | relative_url }}" alt="世界とお金のコンパス ロゴ" width="40" height="40">
      <span class="brand-text">
        <span class="brand-name">{{ site.title | escape }}</span>
        <span class="brand-tagline">{% if site.active_lang == "en" %}Every morning — the world and your money.{% else %}毎朝8時、世界の動きとお金の流れを。{% endif %}</span>
      </span>
    </a>

    <div class="lang-switch" id="langSwitch" data-baseurl="{{ site.baseurl }}">
      <a data-lang="ja" href="#">JA</a>
      <a data-lang="en" href="#">EN</a>
    </div>
    <script>
      (function () {
        var box = document.getElementById("langSwitch");
        if (!box) return;
        var baseurl = box.getAttribute("data-baseurl") || "";
        var rest = location.pathname.indexOf(baseurl) === 0
          ? location.pathname.slice(baseurl.length) : location.pathname;
        var isEn = /^\/en(\/|$)/.test(rest);
        var agnostic = isEn ? rest.replace(/^\/en/, "") : rest;
        if (agnostic === "") agnostic = "/";
        var urls = { ja: baseurl + agnostic, en: baseurl + "/en" + agnostic };
        var active = isEn ? "en" : "ja";
        box.querySelectorAll("a").forEach(function (a) {
          var l = a.getAttribute("data-lang");
          if (l === active) {
            var s = document.createElement("span");
            s.className = "lang-current";
            s.textContent = a.textContent;
            a.replaceWith(s);
          } else {
            a.setAttribute("href", urls[l]);
          }
        });
      })();
    </script>
  </div>
</header>
