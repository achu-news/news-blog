<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  {%- assign page_title = page.title | default: site.title -%}
  {%- assign page_desc = page.excerpt | default: site.description | strip_html | normalize_whitespace | strip -%}
  <title>{{ page_title | escape }}</title>
  <meta name="description" content="{{ page_desc | escape }}">

  <meta property="og:title" content="{{ page_title | escape }}">
  <meta property="og:description" content="{{ page_desc | escape }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta name="twitter:card" content="summary">

  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  {%- feed_meta -%}

  <style>
    :root { color-scheme: dark; }
    body {
      background-color: #0d1117;
      color: #e6edf3;
    }
    .site-header {
      background-color: #161b22;
      border-top-color: #30363d;
      border-bottom: 1px solid #30363d;
    }
    .site-footer {
      background-color: #161b22;
      border-top-color: #30363d;
    }
    .site-title,
    .site-title:visited {
      color: #f0f6fc !important;
    }
    .site-nav .page-link,
    .footer-col-wrapper,
    .post-meta,
    .page-content {
      color: #c9d1d9;
    }
    h1, h2, h3, h4, h5, h6 {
      color: #f0f6fc;
    }
    a {
      color: #58a6ff;
    }
    a:hover {
      color: #79c0ff;
    }
    hr {
      border: 0;
      border-top: 1px solid #30363d;
    }
    blockquote {
      color: #9aa7b2;
      border-left-color: #30363d;
    }
    pre, code {
      background-color: #161b22;
      border-color: #30363d;
      color: #e6edf3;
    }
    table th, table td {
      border-color: #30363d;
    }
    table th {
      background-color: #1c2128;
    }
    table tr:nth-child(even) {
      background-color: #161b22;
    }
    table tr {
      background-color: #0d1117;
    }
    .site-nav {
      background-color: #161b22;
      border-color: #30363d;
    }
    .site-nav .menu-icon > svg { fill: #c9d1d9; }
  </style>
</head>
