<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  {%- assign page_title = page.title | default: site.title -%}
  {%- assign page_desc = page.excerpt | default: site.description | strip_html | normalize_whitespace | strip -%}
  <title>{{ page_title | escape }}</title>
  <meta name="description" content="{{ page_desc | escape }}">

  <meta property="og:title" content="{{ page_title | escape }}">
  <meta property="og:description" content="{{ page_desc | escape }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta name="twitter:card" content="summary">

  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  {%- feed_meta -%}

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-L00D4424B6"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-L00D4424B6');
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      color-scheme: dark;
      --bg: #0a0e17;
      --bg-soft: #111726;
      --bg-card: #141b2d;
      --border: #232b3d;
      --text: #e6edf3;
      --text-muted: #9aa7bd;
      --accent: #38bdf8;
      --accent-2: #22d3ee;
    }

    body {
      background:
        radial-gradient(1200px 600px at 80% -10%, rgba(56,189,248,0.08), transparent 60%),
        radial-gradient(900px 500px at -10% 0%, rgba(34,211,238,0.06), transparent 55%),
        var(--bg);
      color: var(--text);
      font-family: "Noto Sans JP", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.85;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== Header ===== */
    .site-header {
      background: rgba(10, 14, 23, 0.7);
      backdrop-filter: saturate(160%) blur(10px);
      border-top: 0;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 50;
      min-height: 64px;
    }
    .site-header::after {
      content: "";
      display: block;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2), transparent);
    }
    .site-title,
    .site-title:visited {
      font-family: "Space Grotesk", "Noto Sans JP", sans-serif;
      font-weight: 700 !important;
      letter-spacing: 0.2px;
      background: linear-gradient(90deg, #e6edf3, #38bdf8);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .site-nav { background: transparent; border: 0; }
    .site-nav .page-link { color: var(--text-muted); }
    .site-nav .menu-icon > svg { fill: var(--text-muted); }

    /* ===== Typography ===== */
    h1, h2, h3, h4, h5, h6 { color: #f4f7fb; font-weight: 700; }
    a { color: var(--accent); text-decoration: none; transition: color .15s ease; }
    a:hover { color: var(--accent-2); }
    .page-content { color: var(--text); }
    .post-meta {
      color: var(--accent);
      font-family: "Space Grotesk", monospace;
      font-size: 0.82rem;
      letter-spacing: 0.4px;
    }

    /* ===== Post list as cards ===== */
    .post-list { margin-left: 0; list-style: none; }
    .post-list > li {
      background: linear-gradient(180deg, var(--bg-card), var(--bg-soft));
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.4rem 1.6rem;
      margin-bottom: 1.1rem;
      transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
    }
    .post-list > li:hover {
      transform: translateY(-3px);
      border-color: rgba(56,189,248,0.5);
      box-shadow: 0 10px 30px -12px rgba(56,189,248,0.35);
    }
    .post-list .post-link {
      font-size: 1.35rem;
      font-weight: 700;
      color: #f4f7fb;
      display: inline-block;
      margin-top: 0.2rem;
    }
    .post-list .post-link:hover { color: var(--accent); }

    /* ===== Article content ===== */
    .post-title { letter-spacing: 0.2px; line-height: 1.35; }
    .post-content h2 {
      margin-top: 2.4rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--border);
    }
    .post-content h3 {
      margin-top: 1.8rem;
      padding-left: 0.7rem;
      border-left: 3px solid var(--accent);
    }

    hr { border: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--border), transparent); }

    blockquote {
      color: var(--text-muted);
      border-left: 3px solid var(--accent);
      background: var(--bg-soft);
      border-radius: 0 8px 8px 0;
      padding: 0.6rem 1rem;
      font-style: normal;
    }

    pre, code {
      background-color: var(--bg-soft);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: #e6edf3;
    }
    pre { padding: 1rem; }

    /* ===== Tables ===== */
    table {
      border-collapse: separate;
      border-spacing: 0;
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    table th, table td { border: 0; border-bottom: 1px solid var(--border); padding: 0.6rem 0.9rem; }
    table th {
      background: linear-gradient(180deg, #1a2336, #141b2d);
      color: #f4f7fb;
      font-weight: 700;
    }
    table tr:last-child td { border-bottom: 0; }
    table tbody tr { background: transparent; }
    table tbody tr:nth-child(even) { background: rgba(255,255,255,0.02); }
    table tbody tr:hover { background: rgba(56,189,248,0.06); }

    /* ===== Footer ===== */
    .site-footer {
      background: var(--bg-soft);
      border-top: 1px solid var(--border);
    }
    .site-footer a { color: var(--text-muted); }
    .site-footer a:hover { color: var(--accent); }
  </style>
</head>
