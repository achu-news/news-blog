<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  {%- assign page_title = page.title | default: site.title -%}
  {%- assign page_desc = page.excerpt | default: site.description | strip_html | normalize_whitespace | strip -%}
  <title>{{ page_title | escape }}</title>
  <meta name="description" content="{{ page_desc | escape }}">

  <meta property="og:title" content="{{ page_title | escape }}">
  <meta property="og:description" content="{{ page_desc | escape }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta name="twitter:card" content="summary">

  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  <link rel="icon" type="image/png" href="{{ "/assets/favicon-chatgpt.png" | relative_url }}">
  <link rel="apple-touch-icon" href="{{ "/assets/apple-touch-icon.png" | relative_url }}">
  {%- feed_meta -%}

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-L00D4424B6"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-L00D4424B6');
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f7f7f4;
      --surface: #ffffff;
      --border: #e7e5e0;
      --text: #24292f;
      --text-soft: #57606a;
      --text-muted: #8a8f98;
      --accent: #c0392b;        /* 落ち着いた新聞レッド */
      --accent-soft: #fdecea;
      --link: #1b5fa8;          /* 信頼感のあるブルー */
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: "Noto Sans JP", -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      line-height: 1.9;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== Header ===== */
    .site-header {
      background: rgba(255,255,255,0.9);
      backdrop-filter: saturate(150%) blur(8px);
      border-top: 3px solid var(--accent);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 50;
      min-height: 66px;
    }
    .site-header .wrapper { display: flex; align-items: center; }
    .site-title.brand,
    .site-title.brand:visited {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      line-height: 1.25;
      padding: 0.55rem 0;
      margin: 0;
      color: var(--text) !important;
    }
    .brand-mark { width: 40px; height: 40px; flex: none; border-radius: 50%; border: 1px solid var(--border); }
    .brand-text { display: flex; flex-direction: column; }
    .brand-name {
      font-family: "Noto Serif JP", serif;
      font-weight: 700;
      font-size: 1.3rem;
      letter-spacing: 0.5px;
      color: var(--text);
    }
    .brand-tagline {
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.3px;
      margin-top: 1px;
    }
    .site-title.brand:hover .brand-name { color: var(--accent); }

    /* ===== Typography ===== */
    h1, h2, h3, h4, h5, h6 {
      font-family: "Noto Serif JP", serif;
      color: var(--text);
      font-weight: 700;
    }
    a { color: var(--link); text-decoration: none; transition: color .15s ease; }
    a:hover { color: var(--accent); }
    .page-content { color: var(--text); }
    .post-meta {
      color: var(--accent);
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: 0.6px;
    }

    /* ===== Post list as cards ===== */
    .post-list { margin-left: 0; list-style: none; }
    .post-list > li {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem 1.7rem;
      margin-bottom: 1.2rem;
      box-shadow: 0 1px 2px rgba(16,24,40,0.04);
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }
    .post-list > li:hover {
      transform: translateY(-2px);
      border-color: #d9d6cf;
      box-shadow: 0 12px 28px -14px rgba(16,24,40,0.22);
    }
    .post-list .post-link {
      font-family: "Noto Serif JP", serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text);
      display: inline-block;
      margin-top: 0.3rem;
      line-height: 1.45;
    }
    .post-list .post-link:hover { color: var(--accent); }

    /* ===== Article content ===== */
    .post-title { letter-spacing: 0.3px; line-height: 1.4; }
    .post-content { font-size: 1.02rem; }
    .post-content h2 {
      margin-top: 2.6rem;
      padding-left: 0.8rem;
      border-left: 5px solid var(--accent);
      line-height: 1.5;
    }
    .post-content h3 {
      margin-top: 2rem;
      color: var(--text-soft);
    }

    hr { border: 0; height: 1px; background: var(--border); margin: 2rem 0; }

    blockquote {
      color: var(--text-soft);
      border-left: 4px solid var(--accent);
      background: var(--accent-soft);
      border-radius: 0 8px 8px 0;
      padding: 0.7rem 1.1rem;
      font-style: normal;
    }

    pre, code {
      background-color: #f3f3ef;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
    }
    pre { padding: 1rem; }

    /* ===== Tables ===== */
    table {
      border-collapse: separate;
      border-spacing: 0;
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 1px 2px rgba(16,24,40,0.04);
    }
    table th, table td { border: 0; border-bottom: 1px solid var(--border); padding: 0.65rem 0.95rem; }
    table th {
      background: #faf3f1;
      color: var(--text);
      font-family: "Noto Sans JP", sans-serif;
      font-weight: 700;
    }
    table tr:last-child td { border-bottom: 0; }
    table tbody tr:nth-child(even) { background: #fafafa; }
    table tbody tr:hover { background: var(--accent-soft); }

    /* ===== Footer ===== */
    .site-footer {
      background: #f0efea;
      border-top: 1px solid var(--border);
    }
    .site-footer a { color: var(--text-muted); }
    .site-footer a:hover { color: var(--accent); }
  </style>
</head>
