---
layout: default
---
<article class="post h-entry" itemscope itemtype="http://schema.org/BlogPosting">

  <header class="post-header">
    <h1 class="post-title p-name" itemprop="name headline">{{ page.title | escape }}</h1>
    <p class="post-meta">
      <time class="dt-published" datetime="{{ page.date | date_to_xmlschema }}" itemprop="datePublished">
        {%- assign date_format = site.minima.date_format | default: "%Y年%-m月%-d日 %H:%M" -%}
        {{ page.date | date: date_format }}
      </time>
    </p>
  </header>

  <div class="post-content e-content" itemprop="articleBody">
    {{ content }}
  </div>

  {%- include ad-banner.html -%}

  <p class="ad-disclosure" style="margin-top: 2rem; padding: 0.6rem 0.9rem; font-size: 0.8rem; color: #8b949e; border: 1px solid #30363d; border-radius: 6px;">
    ※当ブログの記事には、アフィリエイト広告（Amazonアソシエイトを含む）が含まれる場合があります。
  </p>

</article>
